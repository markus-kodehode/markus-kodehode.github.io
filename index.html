<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <title>Number guesser</title>
  </head>
  <body>
    <div class="guesserGame">
      <h1>Guess the number</h1>
      <label><button onclick="resetGame()">Reset game</button></label>
      <p>The number is between 1 - 100</p>
      <label><input type="number" id="numberInput" /></label>
      <button onclick="guessNumber()" id="numberInputButton">Submit</button>
      <ul id="previousAnswers"></ul>
    </div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
  </body>
</html>
